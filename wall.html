<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝福墙</title>
    <style>
        .blessing-item { border: 1px solid #ccc; padding: 10px; margin: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>祝福墙</h1>
    <div id="blessing-wall"></div>

<script>
const SUPABASE_URL = "https://ylhaxhmkpdgdrudcsloy.supabase.co";
const SUPABASE_KEY = "sb_publishable_lrnh9o-hCrik-z6yLb1Rig_SmD53BIA";

async function loadBlessings() {
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.desc`, {
      headers: { "apikey": SUPABASE_KEY }
    });
    const messages = await response.json();
    const container = document.getElementById("blessing-wall");
    container.innerHTML = "";

    messages.forEach(msg => {
      const item = document.createElement("div");
      item.className = "blessing-item";
      item.innerHTML = `
        <h3>${msg.name}</h3>
        <p>${msg.content}</p>
        <small>${new Date(msg.created_at).toLocaleString()}</small>
      `;
      container.appendChild(item);
    });
  } catch (err) {
    console.error("加载失败", err);
  }
}

document.addEventListener("DOMContentLoaded", loadBlessings);
setInterval(loadBlessings, 10000);
</script>
</body>
</html>
