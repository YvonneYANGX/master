<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>送IAC一朵小红花 - 祝福提交</title>
  <style>
    body{font-family:Arial,sans-serif;background:#fdf6fb;padding:20px;max-width:600px;margin:0 auto}
    .card{background:white;padding:30px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
    h1{text-align:center;color:#be185d;margin-bottom:10px}
    .subtitle{text-align:center;color:#6b7280;font-size:16px;margin-bottom:25px}
    label{display:block;margin:15px 0 5px;font-weight:600}
    input,textarea,select{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:16px}
    button{width:100%;background:#f9a8d4;color:white;border:none;padding:12px;border-radius:8px;font-size:18px;font-weight:600;margin-top:20px;cursor:pointer}
    button:hover{background:#f472b6}
    /* 按钮禁用样式 */
    button:disabled {
      background: #ccc !important;
      cursor: not-allowed !important;
    }
    .tip{text-align:center;color:#6b7280;margin-top:15px;font-size:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>🌸 送IAC一朵小红花</h1>
    <p class="subtitle">感谢你想感谢的人吧~感谢认可拿好礼</p>
    <form id="submitForm">
      <label>我的SESA号（仅数字）</label>
      <input type="text" id="fromSesa" placeholder="请输入你的SESA数字编号" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">

      <label>我的名字/昵称</label>
      <input type="text" id="fromName" placeholder="请输入你的名字" required>

      <label>感谢对象SESA号</label>
      <input type="text" id="toSesa" placeholder="请输入对方SESA编号" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">

      <label>感谢对象名字/昵称</label>
      <input type="text" id="toName" placeholder="请输入对方名字" required>

      <label>祝福类型</label>
      <select id="type">
        <option>工作感谢</option>
        <option>加油鼓励</option>
        <option>感恩祝福</option>
      </select>

      <label>祝福内容</label>
      <textarea id="content" rows="4" placeholder="写下你的祝福/感谢吧～" required></textarea>
      <button type="submit" id="submitBtn">提交祝福（待审核）</button>
    </form>
    <div class="tip">提交后需管理员审核，审核通过展示在祝福墙</div>
  </div>

<script>
// ========== 你的专属Supabase配置 ==========
const SUPABASE_URL = "https://ylhaxhmkpdgdrudcsloy.supabase.co";
const SUPABASE_KEY = "sb_publishable_lrnh9o-hCrik-z6yLb1Rig_SmD53BIA";

// 获取按钮元素
const submitBtn = document.getElementById('submitBtn');
const form = document.getElementById('submitForm');

// ========== 防重复提交 + 提交逻辑 ==========
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // 1. 禁用按钮，防止重复点击（核心！）
  submitBtn.disabled = true;
  submitBtn.innerText = "提交中...请勿重复点击";

  // 校验输入
  const fromSesa = document.getElementById('fromSesa').value.trim();
  const fromName = document.getElementById('fromName').value.trim();
  const toSesa = document.getElementById('toSesa').value.trim();
  const toName = document.getElementById('toName').value.trim();
  const type = document.getElementById('type').value;
  const content = document.getElementById('content').value.trim();

  if (!fromSesa || !fromName || !toSesa || !toName || !content) {
    alert("❌ 请填写所有必填项！");
    // 恢复按钮
    submitBtn.disabled = false;
    submitBtn.innerText = "提交祝福（待审核）";
    return;
  }

  // 构造数据
  const item = {
    fromSesa: fromSesa,
    fromName: fromName,
    toSesa: toSesa,
    toName: toName,
    type: type,
    content: content,
    time: new Date().toLocaleString('zh-CN'),
    likes: 0,
    comments: [],
    status: 'pending'
  };

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify(item)
    });

    if (response.ok) {
      alert("✅ 提交成功！等待管理员审核~");
      form.reset();
    } else {
      const error = await response.json();
      alert(`❌ 提交失败：${error.message || '请稍后重试'}`);
    }
  } catch (err) {
    console.error("网络错误：", err);
    alert("❌ 网络错误，请检查网络");
  } finally {
    // 2. 3秒后恢复按钮（冷却时间，防止连续提交）
    setTimeout(() => {
      submitBtn.disabled = false;
      submitBtn.innerText = "提交祝福（待审核）";
    }, 3000);
  }
});
</script>
</body>
</html>
