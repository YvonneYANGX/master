<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IAC“超”能力文化周 - 提交认可</title>
  <style>
    body{font-family:Arial,sans-serif;background:#fdf6fb;padding:20px;max-width:600px;margin:0 auto}
    .card{background:white;padding:30px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
    h1{text-align:center;color:#be185d;margin-bottom:10px}
    .subtitle{text-align:center;color:#6b7280;font-size:16px;margin-bottom:25px}
    label{display:block;margin:15px 0 5px;font-weight:600}
    input,textarea,select{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:16px}
    button{width:100%;background:#f9a8d4;color:white;border:none;padding:12px;border-radius:8px;font-size:18px;font-weight:600;margin-top:20px;cursor:pointer}
    button:hover{background:#f472b6}
    button:disabled {
      background: #ccc !important;
      cursor: not-allowed !important;
    }
    .tip{text-align:center;color:#6b7280;margin-top:15px;font-size:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>IAC“超”能力文化周</h1>
    <p class="subtitle">写下你与TA的“超”能力故事吧，写认可故事拿好礼</p>
    <form id="submitForm">
      <label>我的SESA号（仅数字）</label>
      <input type="text" id="fromSesa" placeholder="请输入你的SESA数字编号" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">

      <label>我的名字/昵称</label>
      <input type="text" id="fromName" placeholder="请输入你的名字" required>

      <label>感谢对象名字</label>
      <input type="text" id="toName" placeholder="请输入对方名字" required>

      <label>感谢对象部门</label>
      <input type="text" id="toDept" placeholder="请输入对方所在部门" required>

      <label>感谢TA的“超”能力</label>
      <select id="type" required>
        <option>决策力</option>
        <option>执行力</option>
        <option>创新力</option>
      </select>

      <label>感谢内容</label>
      <textarea id="content" rows="4" placeholder="写下你的感谢与认可故事～" required></textarea>
      <button type="submit" id="submitBtn">提交认可（待审核）</button>
    </form>
    <div class="tip">提交后需管理员审核，审核通过展示在祝福墙</div>
  </div>

<script>
// ========== 你的专属Supabase配置（100%正确） ==========
const SUPABASE_URL = "https://ylhaxhmkpdgdrudcsloy.supabase.co";
const SUPABASE_KEY = "sb_publishable_lrnh9o-hCrik-z6yLb1Rig_SmD53BIA";

const submitBtn = document.getElementById('submitBtn');
const form = document.getElementById('submitForm');

// ========== 提交逻辑（防重复+字段完全匹配） ==========
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // 禁用按钮，防止重复提交
  submitBtn.disabled = true;
  submitBtn.innerText = "提交中...请勿重复点击";

  // 严格校验所有输入
  const fromSesa = document.getElementById('fromSesa').value.trim();
  const fromName = document.getElementById('fromName').value.trim();
  const toName = document.getElementById('toName').value.trim();
  const toDept = document.getElementById('toDept').value.trim();
  const type = document.getElementById('type').value;
  const content = document.getElementById('content').value.trim();

  if (!fromSesa || !fromName || !toName || !toDept || !content) {
    alert("❌ 请填写所有必填项！");
    submitBtn.disabled = false;
    submitBtn.innerText = "提交认可（待审核）";
    return;
  }

  // 构造提交数据（100%匹配Supabase表字段，大小写完全一致）
  const item = {
    fromSesa: fromSesa,
    fromName: fromName,
    toName: toName,
    toDept: toDept,
    type: type,
    content: content,
    time: new Date().toLocaleString('zh-CN'),
    likes: 0,
    comments: [],
    status: 'pending'
  };

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify(item)
    });

    if (response.ok) {
      alert("✅ 提交成功！等待管理员审核~");
      form.reset();
    } else {
      const errorData = await response.json();
      console.error("提交失败详情：", errorData);
      alert(`❌ 提交失败：${errorData.message || '请检查表结构/权限'}`);
    }
  } catch (err) {
    console.error("网络错误：", err);
    alert("❌ 网络错误，请检查网络");
  } finally {
    // 3秒后恢复按钮
    setTimeout(() => {
      submitBtn.disabled = false;
      submitBtn.innerText = "提交认可（待审核）";
    }, 3000);
  }
});
</script>
</body>
</html>
