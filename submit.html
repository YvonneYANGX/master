<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交祝福</title>
</head>
<body>
    <h1>提交你的祝福</h1>
    <div>
        <input type="text" id="name" placeholder="请输入你的名字"><br><br>
        <textarea id="content" rows="5" placeholder="请输入你的祝福"></textarea><br><br>
        <button id="submit-btn">提交祝福</button>
    </div>

<script>
const SUPABASE_URL = "https://ylhaxhmkpdgdrudcsloy.supabase.co";
const SUPABASE_KEY = "sb_publishable_lrnh9o-hCrik-z6yLb1Rig_SmD53BIA";

async function submitBlessing() {
  const name = document.getElementById("name").value;
  const content = document.getElementById("content").value;

  if (!name || !content) {
    alert("请填写姓名和祝福内容！");
    return;
  }

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ name, content })
    });

    if (response.ok) {
      alert("✅ 提交成功！");
      document.getElementById("name").value = "";
      document.getElementById("content").value = "";
    } else {
      alert("❌ 提交失败");
    }
  } catch (err) {
    alert("❌ 网络错误");
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("submit-btn").addEventListener("click", submitBlessing);
});
</script>
</body>
</html>
