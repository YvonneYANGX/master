<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
</head>
<body>
    <h1>管理后台 - 所有祝福</h1>
    <div id="admin-container"></div>

<script>
const SUPABASE_URL = "https://ylhaxhmkpdgdrudcsloy.supabase.co";
const SUPABASE_KEY = "sb_publishable_lrnh9o-hCrik-z6yLb1Rig_SmD53BIA";

async function loadAdminBlessings() {
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.desc`, {
      headers: { "apikey": SUPABASE_KEY }
    });
    const messages = await response.json();
    const container = document.getElementById("admin-container");
    container.innerHTML = `<h3>共 ${messages.length} 条祝福</h3>`;

    messages.forEach(msg => {
      const div = document.createElement("div");
      div.style = "border:1px solid #ddd; padding:10px; margin:10px;";
      div.innerHTML = `
        <strong>${msg.name}</strong><br>
        ${msg.content}<br>
        <small>${new Date(msg.created_at).toLocaleString()}</small><br>
        <button onclick="del(${msg.id})">删除这条</button>
      `;
      container.appendChild(div);
    });
  } catch (err) {
    console.error(err);
  }
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await fetch(`${SUPABASE_URL}/rest/v1/messages?id=eq.${id}`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY }
  });
  alert("删除成功");
  loadAdminBlessings();
}

document.addEventListener("DOMContentLoaded", loadAdminBlessings);
</script>
</body>
</html>
